# ABOUTME: Configures the demo app database connections for development and test.
# ABOUTME: Uses Postgres for the runnable demo path and SQLite for the test suite.
default: &default
  pool: 5

development:
  <<: *default
  adapter: postgresql
  url: <%= ENV.fetch("DATABASE_URL", "postgresql://postgres:postgres@localhost:5432/checkpoint_demo") %>

test:
  <<: *default
  adapter: sqlite3
  timeout: 5000
  database: db/test.sqlite3
